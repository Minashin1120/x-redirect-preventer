<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <style>
        body {
            width: 300px;
            padding: 20px;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
        }
        h2 { color: #1d9bf0; font-size: 16px; }
        .status { margin: 15px 0; font-size: 14px; }
        .active { color: #00ba7c; font-weight: bold; }
        .inactive { color: #f4212e; font-weight: bold; }
        .btn {
            background-color: #1d9bf0;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h2 data-i18n="extension_name">X Redirect Preventer</h2>
    <div id="status" class="status">Loading...</div>
    <div class="actions">
        <button id="openConsent" data-i18n="popup_open_consent">Privacy Policy & Terms</button>
        <button id="downloadLogs" style="background: #24292f; margin-top: 10px;" data-i18n="popup_download_logs">Download Debug Logs</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
